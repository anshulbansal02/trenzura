name: Sync products

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        default: qa
        options:
          - qa
          - prod

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
      GOOGLE_SHEETS_RANGE: ${{ vars.GOOGLE_SHEETS_RANGE }}
      PRODUCT_IMAGE_SOURCE_DIR: ${{ vars.PRODUCT_IMAGE_SOURCE_DIR }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate storefront catalog
        run: pnpm sync:products

      - name: Upload product images
        run: pnpm sync:images

      - name: Sync Supabase catalog
        run: pnpm exec tsx scripts/sync-products-to-supabase.ts

      - name: Typecheck generated catalog
        run: pnpm exec tsc --noEmit
