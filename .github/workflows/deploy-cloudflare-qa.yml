name: Deploy storefront QA

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: qa
    env:
      CLOUDFLARE_ENV: qa
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      PRODUCT_IMAGE_PUBLIC_BASE_URL: ${{ vars.PRODUCT_IMAGE_PUBLIC_BASE_URL }}
      CLOUDFLARE_WORKER_NAME: ${{ vars.CLOUDFLARE_WORKER_NAME }}
      CLOUDFLARE_DOMAIN: ${{ vars.CLOUDFLARE_DOMAIN }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate QA deployment config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EXPECTED_SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          required() {
            test -n "${!1}" || { echo "$1 is required"; exit 1; }
          }

          required SUPABASE_URL
          required SUPABASE_SERVICE_ROLE_KEY
          required EXPECTED_SUPABASE_PROJECT_REF
          required VITE_SUPABASE_URL
          required VITE_SUPABASE_ANON_KEY
          required PRODUCT_IMAGE_PUBLIC_BASE_URL
          required CLOUDFLARE_ACCOUNT_ID
          required CLOUDFLARE_API_TOKEN
          required CLOUDFLARE_WORKER_NAME
          required CLOUDFLARE_DOMAIN

      - run: pnpm validate:catalog-assets

      - run: pnpm build

      - name: Deploy QA to Cloudflare Workers
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm exec wrangler deploy --env qa --name "$CLOUDFLARE_WORKER_NAME" --domain "$CLOUDFLARE_DOMAIN"
