name: Deploy storefront

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      CLOUDFLARE_WORKER_NAME: ${{ vars.CLOUDFLARE_WORKER_NAME }}
      CLOUDFLARE_DOMAIN: ${{ vars.CLOUDFLARE_DOMAIN }}
      CLOUDFLARE_WWW_DOMAIN: ${{ vars.CLOUDFLARE_WWW_DOMAIN }}
      PRODUCT_IMAGE_PUBLIC_BASE_URL: ${{ vars.PRODUCT_IMAGE_PUBLIC_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate production deployment config
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          required() {
            test -n "${!1}" || { echo "$1 is required"; exit 1; }
          }

          required VITE_SUPABASE_URL
          required VITE_SUPABASE_ANON_KEY
          required PRODUCT_IMAGE_PUBLIC_BASE_URL
          required CLOUDFLARE_ACCOUNT_ID
          required CLOUDFLARE_API_TOKEN
          required CLOUDFLARE_WORKER_NAME
          required CLOUDFLARE_DOMAIN
          required CLOUDFLARE_WWW_DOMAIN

      - run: pnpm validate:catalog-assets

      - run: pnpm build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm exec wrangler deploy --name "$CLOUDFLARE_WORKER_NAME" --domain "$CLOUDFLARE_DOMAIN" --domain "$CLOUDFLARE_WWW_DOMAIN"
